version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_DATABASE: shop_db
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: shop_user
      WORDPRESS_DB_PASSWORD:  ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: shop_db
    volumes:
      - wordpress_data:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d  # Конфиги сайта
      - /etc/letsencrypt:/etc/letsencrypt # Твои уже готовые сертификаты Certbot
      - wordpress_data:/var/www/html # Чтобы Nginx видел статику сайта
    depends_on:
      - wordpress

volumes:
  db_data:
  wordpress_data:
