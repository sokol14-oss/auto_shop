name: Deploy Auto Shop
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/auto_shop
            git pull origin main || git clone https://github.com/${{ github.repository }}.git .
            COMPOSE_API_VERSION=1.41 docker-compose up -d --build
