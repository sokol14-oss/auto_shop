server {
    listen 80;
    server_name asokolova.pro www.asokolova.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name asokolova.pro www.asokolova.pro;

    ssl_certificate /etc/letsencrypt/live/asokolova.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asokolova.pro/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/html;
    index index.php index.html;

    # Главное правило для ЧПУ (красивых ссылок) WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Передаем PHP-файлы контейнеру wordpress
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000; # Имя сервиса из docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Сжатие и кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }
}
